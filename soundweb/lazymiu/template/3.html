<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色簡介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: center;
            background: linear-gradient(#fff, #ffa500);
            padding: 20px;
        }
        .left-block {
            width: 50%;
            border: 2px solid orange;
            max-width: 600px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 50px; /* 距離頂部的距離 */
        }
        .right-block {
            width: 50%;
            padding: 20px;
        }
        .left-block img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .sound-button {
            display: block;
            margin: 10px auto;
            background-color: #ffa500;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .sound-button:hover {
            background-color: #ff8500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-block">
            <img src="character_image.jpg" alt="角色圖片">
            <h2>角色名稱</h2>
            <p>這裡是角色的簡介內容。</p>
        </div>
        <div class="right-block">
            <button class="sound-button" onclick="playSound1()">播放音效1</button>
            <button class="sound-button" onclick="playSound2()">播放音效2</button>
            <!-- 可以添加更多音效按鈕 -->
        </div>
    </div>

    <script>
        function playSound1() {
            // 播放音效1的程式碼
        }

        function playSound2() {
            // 播放音效2的程式碼
        }

        // 可以添加更多播放音效的函式
    </script>
</body>
</html>
