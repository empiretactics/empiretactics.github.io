        <div class="right-block">
            <!-- 以下是根據 a.txt 動態生成音效按鈕 -->
            <div class="sound-buttons-wrapper">
                <?php
                    // 讀取音效設定檔 a.txt
                    $audioSettings = file("../sound.txt", FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES);

                    foreach ($audioSettings as $setting) {
                        list($audioFile, $audioName) = explode(":", $setting);
                ?>
                <button class="sound-button" onclick="playSound('<?php echo trim($audioFile); ?>')"><?php echo trim($audioName); ?></button>
                <?php } ?>
            </div>
        </div>
    </div>

    <script>
        var audio = new Audio();

        function playSound(soundFile) {
            audio.src = '../sound/' + soundFile;
            audio.play();
        }

        // 可以添加更多播放音效的函式
    </script>
