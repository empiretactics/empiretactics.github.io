<!DOCTYPE html>
<html>
<head>
<title>雷諾曼</title>

<script src="https://code.jquery.com/jquery-3.4.1.js" integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU=" crossorigin="anonymous"></script>
</head>

<body>
<h2 id="output"></h2>
<p>請刷新頁面重抽</p>
</br></br>
<footer><h6>ver.1.1.0</h6></footer>

<script>
$.ajax({
	method:"GET",
	url:"https://script.google.com/macros/s/AKfycbzBgjU-gQgddJrcVlUxsijoDl0SVGJqSD9MVBWNX5Za_zM6284DUXit9ewkf6WN1mQEyQ/exec",
	dataType:"JSON",
	success:function(res){
  		// console.log(res);

  		console.log(err);
  		document.getElementById("output").innerHTML = err;
  	},
});
</script>

</html>
