<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>雷諾曼</title>
    <meta http-equiv="content-type">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <style>
        div {
            text-align: center;
            margin: auto;
        }

        select {
            width: 40px;
            height: auto;
        }

        th {
            width: 200px;
            height: 50px;
        }

        td {
            width: 200px;
            height: 50px;
        }

        img {
            width: 100%;
            height: auto;
        }

        table {
            margin: auto;
            text-align: center;
        }

        p {
            width: 50%;
            margin: auto;
        }

        input {
            width: auto;
            height: auto;
        }

        .alert {
            width: 50%;
            margin: 0 25%;
        }
    </style>
</head>

<body class="p-3 mb-2 bg-dark text-white">
    <div id="error">
        <h3 id="error"></h3>
    </div>

    <div>
        <h5>
            <label for="search_item_list">請選擇 張數&nbsp</label>
            <select id="search_item_list">
                <option value="o">1 </option>
                <option value="e">5 </option>
                <option value="n">9 </option>
            </select>
        </h5>
        <input type="button" value="抽牌" onclick="getList()"><br/>
    </div>

    <div id="outpost"></div>

    <div id="refresh">
        <!-- <a href="https://empiretactics.github.io/lenormand">點擊刷新</a> -->
    </div>

    <footer>
        <h6>ver.1.2.0</h6>
    </footer>
</body>


<script>
    let x = 0; // 橫列
    let y = 0; // 直行

    $(function() {});

    function getList() {
        // 取得輸入參數
        let searchItem = $("#search_item_list").val();

        switch (searchItem) {
            case 'o':
                x = 1; // 橫列
                y = 1; // 直行
                break;
            case 'e':
                x = 5; // 橫列
                y = 1; // 直行
                break;
            case 'n':
                x = 3; // 橫列
                y = 3; // 直行
                break;
        }
        // 執行API
        getLenormandList();
    }

    <!--ajax-->
    /**
     * 取 雷諾曼列表
     */
    function getLenormandList() {
        $.ajax({
            method: "GET",
            url: "https://script.google.com/macros/s/AKfycbxiBZircRPwwY37MBXc_E2RZouOHgS7Iq7peQOUkHpjBy5K6xWmRY3weWiVARt7glIIFQ/exec",
            data: {
                n: x * y,
            },
            dataType: "JSON",
            success: function(res) {
                // console.log(res);
                outpost(res);
            },
            error: function(err) {
                console.log(err);
                document.getElementById("error").innerHTML = err;
            },
        });
    }

    <!--組HTML語法-->
    /**
     * 雷諾曼列表 回傳 整理顯示
     */
    function outpost(data) {
        let text = "<table border='1'>";
        for (let i = 0; i < (2 * y); i++) {
            text += "<tr>";
            for (let j = 0; j < x; j++) {
                let n = j + y * (i - 1) / 2;
                let m = j + y * i / 2 + x * y;
                if (i % 2) {
                    text += "<td>" + data[n] + "</td>";
                } else {
                    text += "<td><img src=" + data[m] + "></td>";
                }
            }
            text += "</tr>";
        }
        text += "</table>";

        document.getElementById("outpost").innerHTML = text;
    }
</script>

</html>
