<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>雷諾曼</title>
    <meta http-equiv="content-type">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <style>
        div {
            text-align: center;
            margin: auto;
        }

        th {
            width: 200px;
            height: 50px;
        }

        td {
            width: 200px;
            height: 50px;
        }

        img {
            width: 100%;
            height: auto;
        }

        table {
            margin: auto;
            text-align: center;
        }

        p {
            width: 50%;
            margin: auto;
        }

        input {
            width: 90%;
            height: auto;
        }

        .alert {
            width: 50%;
            margin: 0 25%;
        }
    </style>
</head>

<script>
    $(function() {
        getList();
    });
</script>

<script>
    function getList() {
        $.ajax({
            method: "GET",
            url: "https://script.google.com/macros/s/AKfycbxiBZircRPwwY37MBXc_E2RZouOHgS7Iq7peQOUkHpjBy5K6xWmRY3weWiVARt7glIIFQ/exec?n=5",
            dataType: "JSON",
            success: function(res) {
                // console.log(res);
                setList(res);
                outpost(res);
            },
            error: function(err) {
                console.log(err);
                document.getElementById("error").innerHTML = err;
            },
        });
    }
</script>

<script>
    function setList(data) {
        let output = "output";
        let img = "img";
        for (let i = 0; i < 5; i++) {
            let j = i + 1;
            document.getElementById(output + j).innerHTML = data[i];
            document.getElementById(img + j).src = data[i + 5];
        }
    }
</script>

<script>
    function outpost(data) {
        let text = "<table border='1'>";
        for (let i = 0; i < 2; i++) {
            text += "<tr>";
            for (let j = 0; j < 5; j++) {
                if (i % 2) {
                    text += "<td>" + data[j] + "</td>";
                } else {
                    text += "<td><img src=" + data[j + 5] + "></td>";
                }
            }
            text += "</tr>";
        }
        text += "</table>";

        document.getElementById("outpost").innerHTML = text;
    }
</script>

<body class="p-3 mb-2 bg-dark text-white">
    <h4 id="error"></h4>
    <br><br>

    <div id="outpost">
    </div>

    <div id="table">
        <table border="1">
            <tr>
                <td><img id="img1"></td>
                <td><img id="img2"></td>
                <td><img id="img3"></td>
                <td><img id="img4"></td>
                <td><img id="img5"></td>
            </tr>
            <tr>
                <td id="output1"></td>
                <td id="output2"></td>
                <td id="output3"></td>
                <td id="output4"></td>
                <td id="output5"></td>
            </tr>
        </table>
    </div><br>

    <div id="refresh">
        <p>
            <a href="https://empiretactics.github.io/taste">點擊刷新</a>
        </p>
    </div>

    <footer>
        <h6>ver.1.1.0</h6>
    </footer>
</body>

</html>
